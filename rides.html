<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Rides - Let's Split</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <img src="assets/logo3.png" alt="Let's Split Logo" width="160">
            </div>
            <h1>Share the Ride, Share the Cost</h1>
        </div>
    </header>

    <div class="container">

        <h2 class="page-title">Available Rides</h2>

        <div class="ride-card">
            <h3>Driver: Deviprasad</h3>
            <p>From: Mysuru</p>
            <p>To: Bengaluru</p>
            <p>Seats Available: 2</p>

            <button class="join-btn-card">
                Join Ride
            </button>
        </div>

        <div class="ride-card">
            <h3>Driver: Rahul</h3>
            <p>From: Mandya</p>
            <p>To: Bengaluru</p>
            <p>Seats Available: 3</p>

            <button class="join-btn-card">
                Join Ride
            </button>
        </div>

        <div class="ride-card">
            <h3>Driver: Akash</h3>
            <p>From: Ramanagara</p>
            <p>To: Electronic City</p>
            <p>Seats Available: 1</p>

            <button class="join-btn-card">
                Join Ride
            </button>
        </div>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
