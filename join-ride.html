<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Ride - Let's Split</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <img src="assets/logo3.png" alt="Let's Split Logo" height="200">
            </div>
            <h1>Share the Ride, Share the Cost</h1>
        </div>
    </header>

    <div class="form-container">

        <h2>Join a Ride</h2>

        <form id="searchRideForm">

            <input
                type="text"
                id="pickup"
                placeholder="Pickup Location"
                required
            >

            <input
                type="text"
                id="destination"
                placeholder="Destination"
                required
            >

            <button type="submit">
                Search Rides
            </button>

        </form>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
