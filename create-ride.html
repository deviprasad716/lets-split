<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ride - Let's Split</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <img src="assets/logo3.png" alt="Let's Split Logo" width="160">
            </div>
            <h1>Share the Ride, Share the Cost</h1>
        </div>
    </header>

    <div class="form-container">

        <h2>Create Ride</h2>

        <form id="rideForm">

            <input type="text"
                   id="name"
                   placeholder="Enter Your Name"
                   required>

            <input type="text"
                   id="pickup"
                   placeholder="Pickup Location"
                   required>

            <input type="text"
                   id="destination"
                   placeholder="Destination"
                   required>

            <input type="date"
                   id="date"
                   required>

            <input type="time"
                   id="time"
                   required>

            <input type="number"
                   id="seats"
                   placeholder="Available Seats"
                   min="1"
                   max="6"
                   required>

            <button type="submit">
                Create Ride
            </button>

        </form>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
